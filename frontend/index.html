<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot · Cognitive Core</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="7" width="16" height="12" rx="3"/>
          <path d="M12 3v4"/>
          <circle cx="9" cy="13" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="13" r="1.2" fill="currentColor" stroke="none"/>
          <path d="M9 17h6"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Robot</div>
        <div class="brand-sub">Cognitive Core · Python backend · display client</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="status-pill" id="statusPill" data-state="offline">
        <span class="dot"></span><span id="statusText">Offline</span>
      </div>
      <div class="status-pill" id="linkPill" data-state="error" title="Backend link">
        <span class="dot"></span><span id="linkText">Backend…</span>
      </div>
      <button id="cameraBtn" class="btn ghost">Camera On</button>
      <button id="muteBtn"  class="btn ghost">Mute</button>
      <button id="powerBtn" class="btn primary">Power On</button>
    </div>
  </header>

  <main class="workspace">

    <!-- TOP: Robot Vision -->
    <section class="card vision-hero">
      <div class="card-head">
        <div class="card-title">Robot Vision</div>
        <div class="card-sub">streamed from the Python core · 1 fps</div>
      </div>
      <div class="camera-wrap">
        <img id="cameraFrame" alt="" />
        <canvas id="cameraOverlay" width="640" height="480"></canvas>
        <div class="camera-idle" id="cameraIdle">camera offline</div>
      </div>
    </section>

    <div class="workspace-grid">
      <!-- LEFT: conversation -->
      <aside class="col left">
        <section class="card conversation-card">
          <div class="card-head">
            <div class="card-title">Conversation</div>
            <div class="card-sub">live transcript · you &amp; the robot</div>
          </div>
          <div class="log clean" id="transcript"></div>
          <div class="chat-row">
            <input id="textInput" type="text" placeholder="Type instead of talking…" />
            <button id="textSend" class="btn primary compact">Send</button>
          </div>
        </section>
      </aside>

      <!-- RIGHT: audio pulse -->
      <aside class="col right">
        <section class="card audio-card">
          <div class="card-head">
            <div class="card-title">Audio Stream</div>
            <div class="card-sub">voice frequency pulses</div>
          </div>
          <div class="audio-pulse-wrap">
            <div class="mic-meter"><div id="micMeterFill"></div></div>
            <div class="speaking-indicator">
              <span class="speaking" id="speakingDot" title="Robot speaking">◉</span>
              <span>Robot is speaking...</span>
            </div>
          </div>
        </section>
      </aside>
    </div>

  </main>

  <script src="js/display.js"></script>
</body>
</html>
