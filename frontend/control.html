<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot · Control Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/control.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>" />
</head>
<body class="control-app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-text">
        <div class="brand-name">Robot Dashboard</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="status-pill" id="statusPill" data-state="offline">
        <span class="dot"></span><span id="statusText">Offline</span>
      </div>
      <button id="settingsBtn" class="btn">⚙️ Settings</button>
      <button id="testGestureBtn" class="btn" style="background:#4CAF50;">Test Arm (Hi)</button>
      <button id="faceTranscriptBtn" class="btn">Face Transcript</button>
      <button id="modeToggleBtn" class="btn">Mode: Auto</button>
      <button id="muteBtn" class="btn">Mute Mic</button>
      <button id="powerBtn" class="btn primary">Power On</button>
    </div>
  </header>

  <main class="dashboard-workspace">
    <div class="video-pane pane">
      <h3>Live Camera</h3>
      <div class="video-container" style="margin-bottom: 1rem;">
        <video id="remoteVideo" autoplay playsinline muted style="width: 100%; max-height: 250px; border-radius: 8px; background: #000; object-fit: contain;"></video>
      </div>
    </div>
    <div class="left-pane pane">
      <h3>Transcript</h3>
      <div id="transcript" class="scroll-box"></div>
    </div>
    
    <div class="right-pane pane">
      <h3>Logs & Actions</h3>
      <div id="actionLog" class="scroll-box log-box"></div>
      <div id="taskList" class="scroll-box log-box"></div>
    </div>
  </main>

  <footer class="dashboard-footer">
    <div class="display-controls">
      <strong>Robot Display Mode:</strong>
      <button class="btn mode-btn active" data-mode="face">Face Only</button>
      <button class="btn mode-btn" data-mode="camera">Camera Only</button>
      <button class="btn mode-btn" data-mode="split">Split View</button>
    </div>
    <div class="cli-input">
      <input type="text" id="textInput" placeholder="CLI override command..." />
      <button id="textSend" class="btn primary">Send</button>
    </div>
  </footer>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay" style="display: none;">
    <div class="modal-content card">
      <div class="card-head">
        <div class="card-title">Local LLM Settings</div>
        <button id="closeSettingsBtn" class="btn ghost compact">✕</button>
      </div>
      <div class="modal-body" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
        <div>
          <label style="font-size: 11px; color: #888; text-transform: uppercase;">API Base URL</label>
          <div style="display: flex; gap: 10px; margin-top: 5px;">
            <input type="text" id="llmUrlInput" value="http://localhost:1234/v1" style="flex: 1; padding: 8px; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px;" />
            <button id="refreshModelsBtn" class="btn">Refresh</button>
          </div>
        </div>
        <div>
          <label style="font-size: 11px; color: #888; text-transform: uppercase;">Model</label>
          <select id="llmModelSelect" style="width: 100%; padding: 8px; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; margin-top: 5px;">
            <option value="">Load models first...</option>
          </select>
        </div>
        <div style="text-align: right; margin-top: 10px;">
          <button id="saveSettingsBtn" class="btn primary">Save & Apply</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/control.js"></script>
</body>
</html>
