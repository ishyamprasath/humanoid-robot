<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBOT Setup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at center, #131219 0%, #07070a 100%);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag; /* Allows dragging the borderless window */
    }

    .splash-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* Ambient background glows */
    .glow-circle {
      position: absolute;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.25) 0%, rgba(79, 70, 229, 0) 70%);
      filter: blur(20px);
      z-index: 1;
      animation: pulseGlow 4s infinite ease-in-out;
    }

    /* Brand Logo / Text */
    .logo-container {
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      color: #4f46e5;
      filter: drop-shadow(0 0 10px rgba(79, 70, 229, 0.6));
      animation: floatIcon 3s infinite ease-in-out;
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 0.5rem;
      text-indent: 0.5rem; /* Offsets letter-spacing to center text properly */
      background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(165, 180, 252, 0.2);
      animation: textGlow 2.5s infinite alternate ease-in-out;
    }

    .subtitle {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.25rem;
      text-transform: uppercase;
      color: #6366f1;
      margin-top: 0.5rem;
      opacity: 0.8;
    }

    /* Elegant progress container */
    .loader-container {
      z-index: 2;
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      border-radius: 999px;
      box-shadow: 0 0 8px #4f46e5;
      animation: simulateProgress 3s cubic-bezier(0.1, 0.5, 0.2, 1) forwards;
    }

    .loader-status {
      font-size: 0.7rem;
      font-family: monospace;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1rem;
      text-transform: uppercase;
      animation: statusCycle 3s steps(1) forwards;
    }

    /* Animations */
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes textGlow {
      0% { text-shadow: 0 0 10px rgba(165, 180, 252, 0.1); }
      100% { text-shadow: 0 0 25px rgba(165, 180, 252, 0.45), 0 0 50px rgba(79, 70, 229, 0.2); }
    }

    @keyframes simulateProgress {
      0% { width: 0%; }
      20% { width: 25%; }
      40% { width: 45%; }
      70% { width: 85%; }
      90% { width: 95%; }
      100% { width: 100%; }
    }

    @keyframes statusCycle {
      0% { content: "Initializing core..."; }
      25% { content: "Loading cognitive network..."; }
      60% { content: "Verifying sensory inputs..."; }
      90% { content: "Activating head interface..."; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="glow-circle"></div>
    
    <div class="logo-container">
      <!-- Premium Animated Robot Mark -->
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="7" width="18" height="12" rx="3"/>
        <path d="M12 3v4"/>
        <circle cx="8" cy="13" r="1" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="13" r="1" fill="currentColor" stroke="none"/>
        <path d="M8 17h8"/>
      </svg>
      <div class="logo-text">ROBOT</div>
      <div class="subtitle">Cognitive System</div>
    </div>

    <div class="loader-container">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="loader-status" id="statusLabel">Starting modules...</div>
    </div>
  </div>

  <script>
    const statuses = [
      { t: 0, text: "Initializing Core..." },
      { t: 600, text: "Loading Cognitive Network..." },
      { t: 1500, text: "Mapping Room Space..." },
      { t: 2300, text: "Connecting Sensors..." }
    ];
    
    const label = document.getElementById("statusLabel");
    statuses.forEach(status => {
      setTimeout(() => {
        label.textContent = status.text;
      }, status.t);
    });
  </script>
</body>
</html>
